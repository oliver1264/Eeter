name: Release

# Build a signed release APK and publish it whenever a version tag is pushed.
#   git tag v2.8 && git push origin v2.8
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed for the GITHUB_TOKEN to create the release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode signing keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > eeter-release.jks

      - name: Create keystore.properties
        run: |
          {
            echo "storeFile=eeter-release.jks"
            echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}"
            echo "keyAlias=${{ secrets.KEY_ALIAS }}"
            echo "keyPassword=${{ secrets.KEY_PASSWORD }}"
          } > keystore.properties

      - name: Build signed release APK
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Stage APK named for the tag
        run: |
          mkdir -p out
          cp app/build/outputs/apk/release/app-release.apk "out/eeter-${{ github.ref_name }}.apk"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Eeter ${{ github.ref_name }}
          files: out/eeter-${{ github.ref_name }}.apk
          generate_release_notes: true
